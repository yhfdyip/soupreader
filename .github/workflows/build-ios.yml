# SoupReader iOS Build Workflow
# push / 手动触发编译生成未签名的 IPA
# - push：仅上传 Actions Artifact（跟随触发分支）
# - workflow_dispatch：额外发布到 nightly Release（保持旧行为）

name: Build iOS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14  # M1 芯片，比 macos-latest 更快
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          safe_ref_name="$(echo "${ref_name}" | tr '/ ' '--')"
          short_sha="${GITHUB_SHA::7}"
          ipa_file="SoupReader-unsigned-${safe_ref_name}-${short_sha}.ipa"
          echo "safe_ref_name=${safe_ref_name}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "ipa_file=${ipa_file}" >> "${GITHUB_OUTPUT}"

      # Flutter 缓存（包含 SDK 和 pub 缓存）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      # CocoaPods 缓存
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      # 获取依赖（并行安装 pods）
      - name: Get dependencies
        run: |
          flutter pub get
          cd ios && pod install --repo-update || pod install

      # 禁用代码签名 - 必须彻底禁用所有签名相关设置
      - name: Disable Codesign
        run: |
          cd ios
          # 修改 project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGNING_REQUIRED=YES"/"CODE_SIGNING_REQUIRED=NO"/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGNING_ALLOWED=YES"/"CODE_SIGNING_ALLOWED=NO"/g' Runner.xcodeproj/project.pbxproj
          # 清除开发团队
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          # 添加到 xcconfig
          echo 'CODE_SIGNING_ALLOWED=NO' >> Flutter/Release.xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=""' >> Flutter/Release.xcconfig
          echo 'PROVISIONING_PROFILE_SPECIFIER=""' >> Flutter/Release.xcconfig
          # 添加到 Debug.xcconfig 以防万一
          echo 'CODE_SIGNING_ALLOWED=NO' >> Flutter/Debug.xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> Flutter/Debug.xcconfig

      # 构建 iOS
      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign -v \
            --build-number=${{ github.run_number }} \
            --dart-define=GIT_SHA=${{ github.sha }} \
            --dart-define=GIT_REF=${{ github.ref_name }} \
            --dart-define=BUILD_NUMBER=${{ github.run_number }}
          
      # 创建 IPA
      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          rm -rf Payload
          mkdir Payload
          cp -R Runner.app Payload/
          # Use ditto to preserve metadata/symlinks; more robust than zip on macOS.
          ditto -c -k --sequesterRsrc --keepParent Payload "../ipa/${{ steps.vars.outputs.ipa_file }}"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.ipa_file }}
          path: build/ios/ipa/${{ steps.vars.outputs.ipa_file }}
          if-no-files-found: error

      # 发布到 Releases
      - name: Deploy
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: nightly
          commit: ${{ github.sha }}
          name: Nightly Build
          body: |
            📦 Commit: ${{ github.sha }}
            🌿 Branch: ${{ github.ref_name }}
            ▶️ Trigger: ${{ github.event_name }}
          artifacts: "build/ios/ipa/${{ steps.vars.outputs.ipa_file }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
